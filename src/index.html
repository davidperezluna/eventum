  <link rel="manifest" href="manifest.webmanifest">
  <!-- Tras configurar Safari Web Push en Apple + OneSignal, pega aquí el Safari Web ID (panel Web → Apple / Safari). Vacío hasta entonces. -->
  <meta name="eventum-onesignal-safari-web-id" content="">

  <!-- OneSignal Web Push (v16). Worker en /push/onesignal/ para no chocar con ngsw-worker.js (PWA). Configurar la misma ruta en el panel: Settings → Web → Advanced → Customize service worker paths. -->
  <script>
    window.OneSignalDeferred = window.OneSignalDeferred || [];
    window.OneSignalDeferred.push(async function (OneSignal) {
      try {
        var safariMeta = document.querySelector('meta[name="eventum-onesignal-safari-web-id"]');
        var safariWebId = safariMeta && safariMeta.getAttribute('content');
        safariWebId = safariWebId && safariWebId.trim();

        var initOptions = {
        appId: 'cb3f9dcf-6085-43d5-99ae-6c76db8abf57',
        // Ruta absoluta desde raíz (/…). En IIS el rewrite SPA no debe servir HTML en /push/… (public/web.config).
        serviceWorkerPath: '/push/onesignal/OneSignalSDKWorker.js',
        serviceWorkerParam: { scope: '/push/onesignal/' },
        allowLocalhostAsSecureOrigin:
          window.location.hostname === 'localhost' ||
          window.location.hostname === '127.0.0.1',
        // Textos del Slidedown (límites OneSignal ~90 caracteres el mensaje, ~15 cada botón)
        promptOptions: {
          slidedown: {
            prompts: [
              {
                type: 'push',
                // autoPrompt en false para no duplicar: el prompt lo disparamos nosotros con promptPush(force).
                autoPrompt: false,
                text: {
                  actionMessage:
                    'Recibe avisos de eventos y novedades. Podés silenciarlas cuando quieras.',
                  acceptButton: 'Activar alertas',
                  cancelButton: 'Ahora no',
                },
              },
            ],
          },
        },
        };
        if (safariWebId) {
          initOptions.safari_web_id = safariWebId;
        }

        await OneSignal.init(initOptions);
        window.__eventumOneSignal = OneSignal;

        try {
          OneSignal.User.PushSubscription.addEventListener('change', function (event) {
            var cur = event && event.current;
            console.info(
              '[OneSignal] PushSubscription change — optedIn:',
              cur && cur.optedIn,
              'subscription id:',
              cur && cur.id,
              '(el panel puede tardar unos segundos en verse actualizado)'
            );
          });
        } catch (e2) {
          console.warn('[OneSignal] PushSubscription listener:', e2);
        }

        window.__eventumForcePushPrompt = function () {
          if (typeof Notification === 'undefined' || Notification.permission !== 'default') {
            console.info('[OneSignal] omitido: Notification no es default (actual:', Notification && Notification.permission, ')');
            return Promise.resolve();
          }
          return OneSignal.Slidedown.promptPush({ force: true }).catch(function (e) {
            console.warn('[OneSignal] promptPush:', e);
          });
        };

        var ua = typeof navigator !== 'undefined' ? navigator.userAgent || '' : '';
        var isIOSDevice =
          /iPad|iPhone|iPod/.test(ua) ||
          (navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1);
        // En iOS el permiso de notificaciones suele exigir un gesto explícito del usuario; el setTimeout no cuenta → el Slidedown no aparece si solo autodisparamos.
        if (!isIOSDevice) {
          window.setTimeout(function () {
            window.__eventumForcePushPrompt();
          }, 1500);
        }
      } catch (err) {
        console.error('[OneSignal] init:', err);
        console.info(
          '[OneSignal] En el dashboard: Push & Web → Site URL debe ser EXACTAMENTE el origen de esta pestaña:',
          window.location.origin,
          '(ej. Angular: http://localhost:4200). Marca también "Treat HTTP localhost as HTTPS" si aplica.'
        );
      }
    });
  </script>
  <script src="https://cdn.onesignal.com/sdks/web/v16/OneSignalSDK.page.js" defer></script>
