<div class="login-container">
  <div class="login-bg" aria-hidden="true">
    <div class="login-bg__gradient"></div>
    <div class="login-bg__grid"></div>
    <div class="login-bg__diag"></div>
    <span class="login-bg__shape login-bg__shape--1"></span>
    <span class="login-bg__shape login-bg__shape--2"></span>
    <span class="login-bg__shape login-bg__shape--3"></span>
  </div>

  <div class="login-layout login-layout--admin">
    <div class="login-shell login-shell--admin">
      <div class="login-card login-card--glass login-card--admin">
        <div class="login-header">
          <div class="logo-container">
            <img src="logo-eventum.svg" alt="Eventum" class="logo-icon" />
          </div>
          <div class="header-text">
            <span class="badge-pruebas">Acceso pruebas · correo y contraseña</span>
            <h1>Iniciar sesión</h1>
            <p class="subtitle">Ruta interna para pruebas (no uses en producción con usuarios finales).</p>
          </div>
        </div>

        <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="login-form">
          <div class="form-group">
            <label for="email-admin">
              <span class="material-icons">email</span>
              Email
            </label>
            <input
              type="email"
              id="email-admin"
              formControlName="email"
              placeholder="tu@email.com"
              autocomplete="username"
              [class.error]="email?.invalid && email?.touched"
            />
            <div *ngIf="email?.invalid && email?.touched" class="error-message">
              <span *ngIf="email?.errors?.['required']">El email es requerido</span>
              <span *ngIf="email?.errors?.['email']">Email inválido</span>
            </div>
          </div>

          <div class="form-group">
            <label for="password-admin">
              <span class="material-icons">lock</span>
              Contraseña
            </label>
            <input
              type="password"
              id="password-admin"
              formControlName="password"
              placeholder="••••••••"
              autocomplete="current-password"
              [class.error]="password?.invalid && password?.touched"
            />
            <div *ngIf="password?.invalid && password?.touched" class="error-message">
              <span *ngIf="password?.errors?.['required']">La contraseña es requerida</span>
              <span *ngIf="password?.errors?.['minlength']">Mínimo 6 caracteres</span>
            </div>
          </div>

          <div *ngIf="error" class="alert-error">
            <span class="material-icons">error</span>
            <span>{{ error }}</span>
          </div>

          <button type="submit" class="btn-login" [disabled]="loginForm.invalid || loading">
            <span *ngIf="!loading" class="material-icons">login</span>
            <span *ngIf="loading" class="spinner"></span>
            {{ loading ? 'Iniciando sesión…' : 'Iniciar sesión' }}
          </button>
        </form>

        <div class="login-footer">
          <p><a routerLink="/login">Volver al acceso con Google</a></p>
          <p>© 2026 Eventum</p>
        </div>
      </div>
    </div>
  </div>
</div>
