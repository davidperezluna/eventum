<div class="layout-container client-layout lector-layout-root">
  <div
    class="client-menu-overlay"
    *ngIf="clientMenuOpen"
    (click)="closeClientMenu()"
    aria-hidden="true"
  ></div>

  <aside
    class="client-mobile-menu"
    [class.open]="clientMenuOpen"
    aria-label="Menú lector"
  >
    <div class="sidebar-header">
      <div class="sidebar-header-content">
        <h1 class="sidebar-logo">
          <img src="logo-eventum.svg" alt="Eventum" class="logo-img" />
        </h1>
        <button
          type="button"
          class="sidebar-close"
          (click)="closeClientMenu()"
          aria-label="Cerrar menú"
        >
          <span class="material-icons">close</span>
        </button>
      </div>
      <p class="subtitle">Validación de entradas</p>
    </div>

    <nav class="sidebar-nav">
      <a
        *ngFor="let item of menuItems"
        [routerLink]="item.path"
        routerLinkActive="active"
        [routerLinkActiveOptions]="{ exact: item.exact }"
        class="nav-item"
        (click)="closeClientMenu()"
      >
        <span class="material-icons nav-icon">{{ item.icon }}</span>
        <span class="nav-label">{{ item.label }}</span>
      </a>
    </nav>

    <div class="sidebar-footer">
      <div *ngIf="userName" class="user-info">
        <div class="user-email">
          <span class="material-icons">person</span>
          <span class="email-text">{{ userName }}</span>
        </div>
        <div class="user-role">
          <span class="material-icons">badge</span>
          <span>Lector · {{ userEmail }}</span>
        </div>
        <button type="button" class="btn-logout" (click)="logout()">
          <span class="material-icons">logout</span>
          <span>Cerrar sesión</span>
        </button>
      </div>
      <p>&copy; {{ currentYear }} Eventum</p>
    </div>
  </aside>

  <header class="client-header">
    <div class="header-container">
      <button
        type="button"
        class="client-menu-toggle"
        (click)="toggleClientMenu()"
        aria-label="Abrir menú"
      >
        <span class="material-icons">menu</span>
      </button>

      <a routerLink="/lector/inicio" class="brand-logo" aria-label="Eventum, ir al inicio">
        <img src="logo-eventum.svg" alt="Eventum" class="brand-logo-img" />
      </a>

      <nav class="client-nav" aria-label="Navegación lector">
        <a
          *ngFor="let item of menuItems"
          [routerLink]="item.path"
          routerLinkActive="active"
          [routerLinkActiveOptions]="{ exact: item.exact }"
          class="client-nav-item"
        >
          {{ item.label }}
        </a>
      </nav>
    </div>
  </header>

  <main class="client-content lector-content">
    <router-outlet />
  </main>
</div>
